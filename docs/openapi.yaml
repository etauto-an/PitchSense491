openapi: 3.0.3
info:
  title: PitchSense Backend API
  version: 0.2.0
  description: >
    Draft API contract aligned to current Android app screens.
    No authentication is required for MVP.
    Player selection is hardcoded client-side. batterId and pitcherId are MLBAM IDs
    (e.g. "665489"), used as lookup keys by the backend.
servers:
  - url: /api/v1

tags:
  - name: Overview
  - name: Advanced
  - name: Heatmap
  - name: PitchSequence

paths:
  /overview/stats:
    get:
      tags: [Overview]
      summary: Fetch overview card data for general and pitcher-specific columns
      operationId: getOverviewStats
      parameters:
        - in: query
          name: batterId
          required: true
          schema:
            type: string
        - in: query
          name: pitcherId
          required: false
          schema:
            type: string
        - in: query
          name: season
          required: false
          schema:
            type: integer
            minimum: 1900
            default: 2025
      responses:
        '200':
          description: Overview stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OverviewStatsResponse'
              examples:
                default:
                  $ref: '#/components/examples/OverviewStatsResponseExample'
        '400':
          $ref: '#/components/responses/BadRequest'

        '404':
          $ref: '#/components/responses/NotFound'

  /advanced/stats:
    get:
      tags: [Advanced]
      summary: Fetch direct Statcast-style advanced metrics and whiff by pitch type
      operationId: getAdvancedStats
      parameters:
        - in: query
          name: batterId
          required: true
          schema:
            type: string
        - in: query
          name: pitcherId
          required: false
          schema:
            type: string
        - in: query
          name: season
          required: false
          schema:
            type: integer
            minimum: 1900
            default: 2025
      responses:
        '200':
          description: Advanced metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdvancedStatsResponse'
              examples:
                default:
                  $ref: '#/components/examples/AdvancedStatsResponseExample'
        '400':
          $ref: '#/components/responses/BadRequest'

        '404':
          $ref: '#/components/responses/NotFound'

  /heatmap:
    get:
      tags: [Heatmap]
      summary: Fetch batter heatmap by metric
      operationId: getHeatmap
      parameters:
        - in: query
          name: batterId
          required: true
          schema:
            type: string
        - in: query
          name: metric
          required: true
          schema:
            $ref: '#/components/schemas/HeatMetric'
        - in: query
          name: season
          required: false
          schema:
            type: integer
            minimum: 1900
            default: 2025
      responses:
        '200':
          description: Heatmap payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HeatmapResponse'
              examples:
                default:
                  $ref: '#/components/examples/HeatmapResponseExample'
        '400':
          $ref: '#/components/responses/BadRequest'

        '404':
          $ref: '#/components/responses/NotFound'

  /pitch-sequence/recommend:
    post:
      tags: [PitchSequence]
      summary: Generate recommended pitch sequence for the given game situation
      operationId: recommendPitchSequence
      x-internal-notes:
        adapter:
          model_endpoint: "POST http://127.0.0.1:5000/recommend/sequence"
          request_mapping:
            batter: "batterId (MLBAM ID; cast to integer if model requires numeric)"
            pitcher: "pitcherId (MLBAM ID; cast to integer if model requires numeric)"
            count: "\"{balls}-{strikes}\""
            outs: "gameSituation.outs"
            on_1b: "runnerOnFirst ? 1 : 0"
            on_2b: "runnerOnSecond ? 1 : 0"
            on_3b: "runnerOnThird ? 1 : 0"
          model_response_example:
            batter: 665489
            count: "0-2"
            on_1b: 1
            on_2b: 0
            on_3b: 1
            outs: 1
            pitcher: 808967
            sequences:
              - score: 0.1657
                sequence: ["CH|Z3", "CU|Z7", "FF|Z2"]
          response_mapping:
            appliedScenario_rules:
              - "strikes == 2 -> Two-Strike Putaway"
              - "balls == 3 -> Hitter Count Damage Control"
              - "high leverage (inning >= 7 with >=1 runner, or outs == 2 with >=2 runners) -> High Leverage"
              - "runnerOnThird == true and outs < 2 -> Runner on 3rd, <2 Outs"
              - "otherwise -> Neutral Situation"
            recommendations:
              source: "sequences[0].sequence"
              trim_to: "pitchesToPredict"
              token_format: "PT|Zx"
              pitch_code_map:
                FF: "4-Seam Fastball"
                SI: "Sinker"
                FC: "Cutter"
                SL: "Slider"
                CU: "Curveball"
                CH: "Changeup"
                FS: "Splitter"
              zone_tokens: "Z1..Z3 upper, Z4..Z6 middle, Z7..Z9 lower"
              effectivenessPct_guidance:
                multi_candidate: "min-max normalize to 65..90 and round integer"
                single_candidate: "default to 80"
          error_mapping:
            invalid_payload: "400 VALIDATION_ERROR"
            unknown_player: "404 NOT_FOUND"
            model_upstream_failure: "502"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PitchSequenceRequest'
            examples:
              default:
                $ref: '#/components/examples/PitchSequenceRequestExample'
      responses:
        '200':
          description: Recommendation payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PitchSequenceResponse'
              examples:
                default:
                  $ref: '#/components/examples/PitchSequenceResponseExample'
        '400':
          $ref: '#/components/responses/BadRequest'

        '404':
          $ref: '#/components/responses/NotFound'

        '502':
          $ref: '#/components/responses/BadGateway'

components:
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              $ref: '#/components/examples/BadRequestExample'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              $ref: '#/components/examples/NotFoundExample'
    BadGateway:
      description: Model service unavailable or timed out
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'


  examples:
    OverviewStatsResponseExample:
      value:
        general:
          - key: ba
            label: BA
            value: 0.285
            isPrimary: true
          - key: k_pct
            label: K%
            value: 24.3
            isPrimary: true
          - key: bb_pct
            label: BB%
            value: 11.2
            isPrimary: true
          - key: obp
            label: OBP
            value: 0.362
            isPrimary: false
          - key: hr
            label: HR
            value: 37
            isPrimary: false
        pitcherSpecific:
          - key: ba
            label: BA
            value: 0.318
            isPrimary: true
          - key: k_pct
            label: K%
            value: 19.2
            isPrimary: true
          - key: bb_pct
            label: BB%
            value: 10.7
            isPrimary: true
          - key: obp
            label: OBP
            value: 0.385
            isPrimary: false
          - key: hr
            label: HR
            value: 5
            isPrimary: false

    AdvancedStatsResponseExample:
      value:
        directMetrics:
          - key: xwoba
            label: xwOBA
            value: 0.372
          - key: xba
            label: xBA
            value: 0.291
          - key: xslg
            label: xSLG
            value: 0.536
          - key: hard_hit_pct
            label: Hard Hit%
            value: 45.2
          - key: barrel_pct
            label: Barrel%
            value: 12.8
          - key: avg_ev
            label: Avg EV
            value: 91.8
          - key: max_ev
            label: Max EV
            value: 113.2
          - key: sweet_spot_pct
            label: Sweet Spot%
            value: 34.4
          - key: chase_pct
            label: Chase%
            value: 27.1
          - key: whiff_pct
            label: Whiff%
            value: 22.9
          - key: zone_contact_pct
            label: Zone Contact%
            value: 84.6
          - key: csw_pct
            label: CSW%
            value: 28.7
        whiffByPitchType:
          - pitchType: 4-Seam Fastball
            whiffPct: 18.5
          - pitchType: Slider
            whiffPct: 35.8
          - pitchType: Changeup
            whiffPct: 28.3

    HeatmapResponseExample:
      value:
        metric: BA
        grid:
          # Row 0 — high chase zone
          - - { value: 0.200, level: OUTER }
            - { value: 0.215, level: OUTER }
            - { value: 0.220, level: OUTER }
            - { value: 0.210, level: OUTER }
            - { value: 0.198, level: OUTER }
          # Row 1 — top of strike zone
          - - { value: 0.238, level: OUTER }
            - { value: 0.275, level: BELOW_AVG }
            - { value: 0.310, level: GOOD }
            - { value: 0.268, level: BELOW_AVG }
            - { value: 0.230, level: OUTER }
          # Row 2 — middle of strike zone
          - - { value: 0.245, level: OUTER }
            - { value: 0.332, level: GOOD }
            - { value: 0.388, level: ELITE }
            - { value: 0.316, level: GOOD }
            - { value: 0.241, level: OUTER }
          # Row 3 — bottom of strike zone
          - - { value: 0.235, level: OUTER }
            - { value: 0.270, level: BELOW_AVG }
            - { value: 0.295, level: BELOW_AVG }
            - { value: 0.258, level: BELOW_AVG }
            - { value: 0.228, level: OUTER }
          # Row 4 — low chase zone
          - - { value: 0.195, level: OUTER }
            - { value: 0.205, level: OUTER }
            - { value: 0.212, level: OUTER }
            - { value: 0.202, level: OUTER }
            - { value: 0.190, level: OUTER }

    PitchSequenceRequestExample:
      value:
        batterId: "665489"
        pitcherId: "808967"
        pitchesToPredict: 3
        gameSituation:
          inning: 7
          balls: 1
          strikes: 2
          outs: 1
          runnerOnFirst: true
          runnerOnSecond: false
          runnerOnThird: true

    PitchSequenceResponseExample:
      value:
        appliedScenario: Two-Strike Putaway
        recommendations:
          - step: 1
            pitchType: Slider
            description: Back-foot, lower third — chase for strike three
            effectivenessPct: 84
          - step: 2
            pitchType: Splitter
            description: Bottom edge — late drop below zone
            effectivenessPct: 80
          - step: 3
            pitchType: 4-Seam Fastball
            description: Top rail, glove side — finish above bat path
            effectivenessPct: 76

    NotFoundExample:
      value:
        error:
          code: NOT_FOUND
          message: The requested resource was not found

    BadRequestExample:
      value:
        error:
          code: VALIDATION_ERROR
          message: Invalid pitchesToPredict range
          details:
            field: pitchesToPredict

  schemas:
    StatCard:
      type: object
      required: [key, label, value, isPrimary]
      properties:
        key:
          type: string
        label:
          type: string
        value:
          type: number
        isPrimary:
          type: boolean

    OverviewStatsResponse:
      type: object
      required: [general, pitcherSpecific]
      properties:
        general:
          type: array
          items:
            $ref: '#/components/schemas/StatCard'
        pitcherSpecific:
          type: array
          items:
            $ref: '#/components/schemas/StatCard'

    DirectMetric:
      type: object
      required: [key, label, value]
      properties:
        key:
          type: string
        label:
          type: string
        value:
          type: number

    WhiffByPitchType:
      type: object
      required: [pitchType, whiffPct]
      properties:
        pitchType:
          type: string
          description: >
            Full display name of the pitch type (e.g. "4-Seam Fastball", "Slider", "Changeup").
            Must be a human-readable label — do NOT use Statcast pitch codes (FF, SL, CH, etc.).
        whiffPct:
          type: number

    AdvancedStatsResponse:
      type: object
      required: [directMetrics, whiffByPitchType]
      properties:
        directMetrics:
          type: array
          items:
            $ref: '#/components/schemas/DirectMetric'
        whiffByPitchType:
          type: array
          items:
            $ref: '#/components/schemas/WhiffByPitchType'

    HeatMetric:
      type: string
      enum: [BA, SLG, OPS]

    HeatLevel:
      type: string
      enum: [OUTER, ELITE, GOOD, BELOW_AVG, WEAK]

    HeatCell:
      type: object
      required: [value, level]
      properties:
        value:
          type: number
        level:
          $ref: '#/components/schemas/HeatLevel'

    HeatmapResponse:
      type: object
      required: [metric, grid]
      properties:
        metric:
          $ref: '#/components/schemas/HeatMetric'
        grid:
          description: >
            5×5 cell matrix, rows 0–4 top-to-bottom (high to low in the zone),
            columns 0–4 left-to-right from the catcher's perspective.
            The inner 3×3 block (rows 1–3, cols 1–3) represents the strike zone;
            the outer ring (row/col 0 or 4) represents the chase zone.
          type: array
          minItems: 5
          maxItems: 5
          items:
            type: array
            minItems: 5
            maxItems: 5
            items:
              $ref: '#/components/schemas/HeatCell'

    GameSituation:
      type: object
      required: [inning, balls, strikes, outs, runnerOnFirst, runnerOnSecond, runnerOnThird]
      properties:
        inning:
          type: integer
          minimum: 1
          maximum: 9
          description: "MVP scope: extra innings not supported."
        balls:
          type: integer
          minimum: 0
          maximum: 3
        strikes:
          type: integer
          minimum: 0
          maximum: 2
        outs:
          type: integer
          minimum: 0
          maximum: 2
        runnerOnFirst:
          type: boolean
        runnerOnSecond:
          type: boolean
        runnerOnThird:
          type: boolean

    PitchSequenceRequest:
      type: object
      required: [batterId, pitcherId, pitchesToPredict, gameSituation]
      properties:
        batterId:
          type: string
          description: MLBAM player ID as a string (not display name).
        pitcherId:
          type: string
          description: MLBAM player ID as a string (not display name).
        pitchesToPredict:
          type: integer
          minimum: 1
          maximum: 3
        gameSituation:
          $ref: '#/components/schemas/GameSituation'

    SequenceRecommendation:
      type: object
      required: [step, pitchType, description, effectivenessPct]
      properties:
        step:
          type: integer
          minimum: 1
        pitchType:
          type: string
          description: >
            Full display name of the pitch type (e.g. "Slider", "Splitter", "High Fastball").
            Must be a human-readable label — do NOT use Statcast pitch codes (FF, SL, CH, etc.).
        description:
          type: string
          description: >
            Zone and location language for coaches (e.g. "Back-foot, lower third — chase for strike three").
            Do NOT include pitch speed — speed data is not available from the model output.
        effectivenessPct:
          type: integer
          minimum: 0
          maximum: 100

    PitchSequenceResponse:
      type: object
      required: [appliedScenario, recommendations]
      properties:
        appliedScenario:
          type: string
          description: >
            Scenario label derived from the game situation. Evaluated in priority order:
            strikes == 2 → "Two-Strike Putaway";
            balls == 3 → "Hitter Count Damage Control";
            high leverage (inning >= 7 with >=1 runner, or outs == 2 with >=2 runners) → "High Leverage";
            runnerOnThird and outs < 2 → "Runner on 3rd, <2 Outs";
            otherwise → "Neutral Situation".
          enum:
            - Two-Strike Putaway
            - Hitter Count Damage Control
            - High Leverage
            - Runner on 3rd, <2 Outs
            - Neutral Situation
        recommendations:
          type: array
          items:
            $ref: '#/components/schemas/SequenceRecommendation'

    ErrorDetail:
      type: object
      additionalProperties: true

    ErrorBody:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          $ref: '#/components/schemas/ErrorDetail'

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorBody'
